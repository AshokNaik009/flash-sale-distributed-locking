services:
  # ── Redis (Render Key Value — free managed tier) ─────────────────────────
  - type: keyvalue
    name: flash-sale-redis
    plan: free
    ipAllowList: []   # empty = only Render services on the same workspace can connect

  # ── Public API ───────────────────────────────────────────────────────────
  - type: web
    name: flash-sale-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: free
    envVars:
      - key: REDIS_URL
        fromService:
          name: flash-sale-redis
          type: keyvalue
          property: connectionString
      - key: RABBITMQ_URL
        sync: false   # set in dashboard after CloudAMQP signup (e.g. amqps://user:pass@xxx.cloudamqp.com/vhost)

  # ── Worker (deployed as a 'web' service to stay on free tier) ────────────
  # Background workers require a paid plan, so we deploy this as a free web
  # service that runs the consumer loop AND exposes a tiny /health endpoint.
  - type: web
    name: order-processor
    runtime: docker
    dockerfilePath: ./worker/Dockerfile
    dockerContext: ./worker
    plan: free
    envVars:
      - key: RABBITMQ_URL
        sync: false
