services:
  # ── Public API ───────────────────────────────────────────────────────────
  - type: web
    name: flash-sale-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    envVars:
      - key: REDIS_HOST
        fromService:
          name: redis-internal
          type: pvt
          property: host
      - key: REDIS_PORT
        value: "6379"
      - key: RABBITMQ_HOST
        fromService:
          name: rabbitmq-internal
          type: pvt
          property: host
      - key: RABBITMQ_PORT
        value: "5672"
      - key: RABBITMQ_USER
        value: guest
      - key: RABBITMQ_PASS
        value: guest

  # ── Background Worker ────────────────────────────────────────────────────
  - type: worker
    name: order-processor
    runtime: docker
    dockerfilePath: ./worker/Dockerfile
    dockerContext: ./worker
    envVars:
      - key: RABBITMQ_HOST
        fromService:
          name: rabbitmq-internal
          type: pvt
          property: host
      - key: RABBITMQ_PORT
        value: "5672"
      - key: RABBITMQ_USER
        value: guest
      - key: RABBITMQ_PASS
        value: guest

  # ── Redis (private — never exposed to the internet) ──────────────────────
  - type: pvt
    name: redis-internal
    runtime: docker
    image:
      url: docker.io/redis:7-alpine

  # ── RabbitMQ (private) ───────────────────────────────────────────────────
  # NOTE: Without a Persistent Disk the queue is in-memory only.
  # Messages are lost on restart — acceptable for a portfolio POC.
  # Production fix: attach a Render Persistent Disk and use RabbitMQ's
  # durable queue + message persistence features.
  - type: pvt
    name: rabbitmq-internal
    runtime: docker
    image:
      url: docker.io/rabbitmq:3-management
    envVars:
      - key: RABBITMQ_DEFAULT_USER
        value: guest
      - key: RABBITMQ_DEFAULT_PASS
        value: guest
