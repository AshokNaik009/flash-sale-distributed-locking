version: "3.9"

# Note: RabbitMQ runs on CloudAMQP (free Little Lemur tier), not locally.
# Reads RABBITMQ_URL from the .env file in this directory.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: ${RABBITMQ_URL:?RABBITMQ_URL not set — copy .env.example to .env}
    depends_on:
      - redis

  worker:
    build: ./worker
    ports:
      - "3001:3000"
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:?RABBITMQ_URL not set — copy .env.example to .env}
